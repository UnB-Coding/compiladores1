site_name: Compiladores 1
site_description: Documentação do projeto de compilador utilizando flex e bison.
site_author: Equipe

theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro

nav:
  - Início: index.md
  - Compilador:
    - Como Executar: como_executar.md
    - Analisador Léxico (Flex): lexer.md
    - Analisador Sintático (Bison): parser.md
    - Explicação dos Arquivos: explicacao_arquivos.md
    - Guia Gramática: guia_gramatica.md
    - Testes: tests.md
  - Contribuição: contributing.md
  - Relatórios:
    - Sprint 1: sprint1.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
